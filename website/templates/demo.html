<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Réservation Demo</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; padding: 40px 20px; }
        .demo-form-card { max-width: 600px; margin: 0 auto; background: #fff; padding: 40px; border: 1px solid #e2e8f0; }
        .demo-card-header { margin-bottom: 30px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        label { font-size: 0.85rem; font-weight: 600; margin-bottom: 5px; color: #111; }
        input, select, textarea { padding: 10px; border: 1px solid #e2e8f0; border-radius: 0; outline: none; width: 100%; box-sizing: border-box; }
        textarea { resize: vertical; min-height: 120px; }
        input:focus, select:focus, textarea:focus { border-color: #000; }
        .btn-submit { width: 100%; padding: 12px; background: #000; color: #fff; border: none; font-weight: 700; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        .link-help { font-size: 0.75rem; color: #64748b; margin-top: 5px; text-decoration: none; }
    </style>
</head>
<body>

<div class="demo-form-card">
    <div class="demo-card-header">
        <h2>Planifier une démo</h2>
        <p style="color: #64748b; font-size: 0.9rem;">Informations de votre entreprise.</p>
        <p style="color: #94a3b8; font-size: 0.8rem; margin-top: 8px;">Les champs marqués * sont obligatoires.</p>
    </div>

    <form method="POST" action="{% url 'demo' %}">
        {% csrf_token %}

        <div class="form-grid">
            <div class="form-group"><label>Nom *</label><input type="text" name="name" placeholder="Ex : Diallo" required></div>
            <div class="form-group"><label>Prénom *</label><input type="text" name="lastname" placeholder="Ex : Amina" required></div>
        </div>

        <div class="form-group"><label>Entreprise *</label><input type="text" name="enterprise_label" placeholder="Nom de votre entreprise" required></div>
        <div class="form-group"><label>Site web</label><input type="text" name="site_web" placeholder="www.entreprise.com ou entreprise.com"></div>

        <div class="form-grid">
            <div class="form-group">
                <label>Taille entreprise</label>
                <select name="taille_entreprise">
                    <option value="">Choisir une taille</option>
                    <option value="1-5">1-5 employés</option>
                    <option value="6-20">6-20 employés</option>
                    <option value="21-50">21-50 employés</option>
                    <option value="50+">50+ employés</option>
                </select>
            </div>
            <div class="form-group">
                <label>Catégorie</label>
                <select name="categorie">
                    <option value="">Choisir une catégorie</option>
                    {% for cat in categories %}
                        <option value="{{ cat.id }}">{{ cat.designation }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="form-group">
            <label for="designation">Raison de la démo *</label>
            <textarea id="designation" name="designation" rows="4" placeholder="Expliquez brièvement ce que vous voulez voir pendant la démo" required></textarea>
        </div>

        <div class="form-group"><label>Rôle *</label><input type="text" name="role" placeholder="Ex : Responsable RH" required></div>
        <div class="form-group"><label>Téléphone</label><input type="tel" name="tel" placeholder="+242 06 000 00 00"></div>
        <div class="form-group"><label>Email *</label><input type="email" name="email" placeholder="vous@entreprise.com" required></div>
        <div class="form-group"><label>Date et heure du rendez-vous *</label><input type="datetime-local" name="date_time" required></div>

        <button type="submit" class="btn-submit">Confirmer la demande</button>
    </form>
</div>

</body>
</html>
